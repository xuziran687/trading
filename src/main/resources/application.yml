springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.longan.controller

knife4j:
  enable: true
  setting:
    language: zh-CN
    enableFooter: false
    enableSwaggerModels: true
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/longan_apex
         ?useUnicode=true
         &characterEncoding=utf-8
         &useSSL=false
         &allowPublicKeyRetrieval=true
         &serverTimezone=Asia/Shanghai
    username: root
    password: '000000'
