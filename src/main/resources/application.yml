springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.longan.controller

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/longan_apex?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB  # 限制单张图片大小
      max-request-size: 30MB

mybatis-plus:
  # XML 扫描路径（🔥你刚刚问的重点）
  mapper-locations: classpath*:mapper/*.xml

  # 实体类包（可选，但建议加）
  type-aliases-package: com.longan.pojo.entity

  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # 打印 SQL（开发必开🔥）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  global-config:
    db-config:
      id-type: auto
      insert-strategy: not_null

server:
  error:
    include-message: always
    include-stacktrace: always
longan:
  upload:
    # 容器内部访问的路径（记得要把 Docker 卷也挂载给 SpringBoot 容器）
    path: /opt/longan/images/
    # Nginx 暴露出来的访问域名
    domain: http://localhost:8088/images/