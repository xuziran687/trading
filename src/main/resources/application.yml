springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.longan.controller

knife4j:
  enable: true
  setting:
    language: zh-CN
    enableFooter: false
    enableSwaggerModels: true
spring:
  datasource:
    # 核心配置，重点检查 url、username、password
    url: jdbc:mysql://localhost:3306/longan_apex?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root  # 确认数据库用户名正确
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
